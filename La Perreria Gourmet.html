<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Perrería Gourmet PV – Sales Tracker</title>
<style>
  :root { --gold: #d4af37; --bg: #0b0b0b; --card-bg: #141414; --text: #f5f5f5; --danger: #cc0000; --success: #25D366; }
  body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 60px; }
  
  /* HEADER & LOGO AREA */
  header { padding:20px; border-bottom: 3px solid var(--gold); background: #000; text-align: center; }
  .logo-placeholder { font-weight: 900; color: var(--gold); letter-spacing: 2px; font-size: 24px; text-transform: uppercase; }
  .logo-sub { font-size: 12px; color: #888; letter-spacing: 4px; }

  main { padding:20px; max-width:1100px; margin:auto; }

  /* DASHBOARD STATS */
  .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
  .stat-card { background: var(--card-bg); border: 1px solid #333; padding: 20px; border-radius: 12px; border-top: 4px solid var(--gold); }
  .stat-label { font-size: 11px; color: #888; text-transform: uppercase; font-weight: 900; }
  .stat-val { font-size: 24px; font-weight: 700; color: #fff; margin-top: 5px; }

  /* ACTION BUTTONS */
  .action-bar { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
  .btn { padding: 12px 20px; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 13px; }
  .btn-gold { background: var(--gold); color: #000; }
  .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
  .btn-danger { background: #440000; color: #ff5a5a; }

  /* TABLES */
  .card { background: var(--card-bg); border: 1px solid #2a2a2a; border-radius: 15px; padding: 20px; margin-bottom: 25px; }
  .table-container { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: #080808; }
  th { text-align: left; color: var(--gold); padding: 12px; border-bottom: 2px solid #222; font-size: 11px; text-transform: uppercase; }
  td { padding: 12px; border-bottom: 1px solid #1a1a1a; font-size: 14px; }

  /* MODALS */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .sheet { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid var(--gold); width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
  label { font-size: 12px; font-weight: 900; color: var(--gold); display: block; margin-top: 15px; text-transform: uppercase; }
  input { width: 100%; padding: 12px; margin: 5px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; }
</style>
</head>
<body>

<header>
  <div class="logo-placeholder">LA PERRERÍA GOURMET</div>
  <div class="logo-sub">NATURAL PET FOOD PV</div>
</header>

<main>
  <!-- Inventory Dashboard -->
  <div class="dash-grid">
    <div class="stat-card">
      <div class="stat-label">Current Stock</div>
      <div id="stockVal" class="stat-val">0.0 kg</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Sales (Today)</div>
      <div id="todaySales" class="stat-val">$0.00</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Kilos Sold (Today)</div>
      <div id="todayKilos" class="stat-val">0.0 kg</div>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn btn-gold" onclick="openModal('saleModal')">+ NEW SALE</button>
    <button class="btn btn-outline" onclick="openModal('stockModal')">📦 ADD STOCK</button>
    <button class="btn btn-danger" onclick="openModal('expenseModal')">💸 EXPENSE</button>
  </div>

  <!-- Recent Transactions -->
  <div class="card">
    <h3 style="margin-top:0; color:var(--gold);">DAILY LEDGER</h3>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Client/Item</th>
            <th>Kilos</th>
            <th>Price/kg</th>
            <th>Total</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="ledgerBody"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- MODALS -->
<div id="saleModal" class="modal">
  <div class="sheet">
    <h2 style="color:var(--gold); margin-top:0;">NEW SALE</h2>
    <label>Client Name</label>
    <input id="sClient" placeholder="First Last">
    <label>WhatsApp Number</label>
    <input id="sPhone" placeholder="521...">
    <label>Kilos Sold</label>
    <input id="sKilos" type="number" step="0.1" oninput="calcSale()">
    <label>Price per Kilo ($)</label>
    <input id="sPrice" type="number" value="50" oninput="calcSale()">
    <div style="margin-top:15px; padding:10px; background:#222; border-radius:6px;">
       <div class="stat-label">Sale Total:</div>
       <div id="salePreview" style="font-size:20px; font-weight:900; color:var(--success);">$0.00</div>
    </div>
    <button class="btn btn-gold" style="width:100%; margin-top:20px;" onclick="addSale()">FINALIZE SALE</button>
    <button class="btn" style="width:100%; color:#555;" onclick="closeModal('saleModal')">CANCEL</button>
  </div>
</div>

<div id="stockModal" class="modal">
  <div class="sheet">
    <h2 style="color:var(--gold); margin-top:0;">ADD NEW STOCK</h2>
    <label>Kilos Purchased</label>
    <input id="stKilos" type="number" step="0.1">
    <label>Purchase Cost ($)</label>
    <input id="stCost" type="number">
    <label>Notes</label>
    <input id="stNote" placeholder="e.g. Bulk buy chicken breast">
    <button class="btn btn-gold" style="width:100%; margin-top:20px;" onclick="addStock()">ADD TO INVENTORY</button>
    <button class="btn" style="width:100%; color:#555;" onclick="closeModal('stockModal')">CANCEL</button>
  </div>
</div>

<div id="expenseModal" class="modal">
  <div class="sheet">
    <h2 style="color:#ff5a5a; margin-top:0;">GENERAL EXPENSE</h2>
    <label>Description</label>
    <input id="exNote" placeholder="e.g. Bags, Delivery Gas">
    <label>Amount ($)</label>
    <input id="exCost" type="number">
    <button class="btn btn-danger" style="width:100%; margin-top:20px;" onclick="addExpense()">RECORD EXPENSE</button>
    <button class="btn" style="width:100%; color:#555;" onclick="closeModal('expenseModal')">CANCEL</button>
  </div>
</div>

<script>
let perreriaData = JSON.parse(localStorage.getItem("perreria_v1") || '{"stock":0, "transactions":[]}');

function save() {
  localStorage.setItem("perreria_v1", JSON.stringify(perreriaData));
  render();
}

function openModal(id) { document.getElementById(id).style.display = "flex"; }
function closeModal(id) { document.getElementById(id).style.display = "none"; }

function calcSale() {
  const k = parseFloat(document.getElementById('sKilos').value) || 0;
  const p = parseFloat(document.getElementById('sPrice').value) || 0;
  document.getElementById('salePreview').innerText = '$' + (k * p).toFixed(2);
}

function addSale() {
  const k = parseFloat(document.getElementById('sKilos').value);
  const p = parseFloat(document.getElementById('sPrice').value);
  if(!k || !p) return alert("Enter kilos and price.");

  perreriaData.transactions.push({
    id: Date.now(),
    date: new Date().toISOString().slice(0,10),
    type: 'sale',
    client: document.getElementById('sClient').value,
    kilos: k,
    price: p,
    total: k * p
  });
  perreriaData.stock -= k;
  closeModal('saleModal');
  save();
}

function addStock() {
  const k = parseFloat(document.getElementById('stKilos').value);
  const c = parseFloat(document.getElementById('stCost').value);
  perreriaData.transactions.push({
    id: Date.now(),
    date: new Date().toISOString().slice(0,10),
    type: 'purchase',
    client: document.getElementById('stNote').value || 'Stock Restock',
    kilos: k,
    price: c / k,
    total: -c
  });
  perreriaData.stock += k;
  closeModal('stockModal');
  save();
}

function addExpense() {
  const c = parseFloat(document.getElementById('exCost').value);
  perreriaData.transactions.push({
    id: Date.now(),
    date: new Date().toISOString().slice(0,10),
    type: 'expense',
    client: document.getElementById('exNote').value,
    kilos: 0,
    price: 0,
    total: -c
  });
  closeModal('expenseModal');
  save();
}

function deleteTx(id) {
  if(confirm("Delete this entry? Stock will NOT be automatically adjusted back.")) {
    perreriaData.transactions = perreriaData.transactions.filter(t => t.id !== id);
    save();
  }
}

function render() {
  const today = new Date().toISOString().slice(0,10);
  let dayKilos = 0;
  let daySales = 0;

  document.getElementById('stockVal').innerText = perreriaData.stock.toFixed(1) + ' kg';

  const body = document.getElementById('ledgerBody');
  body.innerHTML = perreriaData.transactions.slice().reverse().map(t => {
    if(t.date === today && t.type === 'sale') {
      dayKilos += t.kilos;
      daySales += t.total;
    }
    const color = t.type === 'sale' ? 'var(--success)' : '#ff5a5a';
    return `
      <tr>
        <td>${t.date.split('-').slice(1).join('/')}</td>
        <td style="color:${color}; font-weight:900; font-size:10px;">${t.type.toUpperCase()}</td>
        <td>${t.client}</td>
        <td>${t.kilos > 0 ? t.kilos + ' kg' : '-'}</td>
        <td>${t.price > 0 ? '$' + t.price : '-'}</td>
        <td style="color:${color}; font-weight:900;">${t.total < 0 ? '-' : ''}$${Math.abs(t.total).toFixed(2)}</td>
        <td><button style="background:none; border:none; color:#444; cursor:pointer;" onclick="deleteTx(${t.id})">✕</button></td>
      </tr>
    `;
  }).join("");

  document.getElementById('todaySales').innerText = '$' + daySales.toFixed(2);
  document.getElementById('todayKilos').innerText = dayKilos.toFixed(1) + ' kg';
}

render();
</script>
</body>
</html>
