<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Perrería Gourmet PV – Version 9.9 (DATA RESTORE)</title>
<style>
  :root { --gold: #d4af37; --bg: #000000; --card-bg: #111111; --text: #ffffff; --danger: #ff4444; --success: #25D366; }
  body { margin:0; font-family: sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }
  header { padding:20px; border-bottom: 2px solid var(--gold); text-align: center; background: #000; }
  main { padding:15px; max-width:1000px; margin:auto; }
  
  /* Buttons & Controls */
  .backup-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
  .btn { padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; }
  .btn-gold { background: var(--gold); color: #000; }
  .btn-dark { background: #222; color: #fff; border: 1px solid #444; }
  .btn-danger { background: #330000; color: var(--danger); border: 1px solid var(--danger); }

  /* Dashboard */
  .dash-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--card-bg); border: 1px solid #333; padding: 10px; border-radius: 8px; border-left: 4px solid var(--gold); }
  .stat-label { font-size: 8px; color: var(--gold); text-transform: uppercase; font-weight: bold; }
  .stat-val { font-size: 16px; font-weight: bold; }

  /* Tables */
  .card { background: var(--card-bg); border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 25px; }
  .section-title { color: var(--gold); font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: block; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; color: #666; font-size: 9px; padding: 8px; border-bottom: 1px solid #333; }
  td { padding: 10px; border-bottom: 1px solid #222; font-size: 13px; }

  /* Modals */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
  .sheet { background: #0a0a0a; padding: 20px; border-radius: 12px; border: 2px solid var(--gold); width: 90%; max-width: 400px; }
  label { font-size: 10px; color: var(--gold); display: block; margin-top: 10px; }
  input { width: 100%; padding: 12px; margin: 5px 0; background: #111; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }
</style>
</head>
<body>

<header>
  <h1 style="color:var(--gold); margin:0 0 15px 0; font-size:18px;">LA PERRERÍA GOURMET PV</h1>
  <div class="backup-bar">
    <button class="btn btn-dark" onclick="exportData()">💾 EXPORT BACKUP</button>
    <button class="btn btn-dark" onclick="document.getElementById('importFile').click()">📂 IMPORT BACKUP</button>
    <input type="file" id="importFile" hidden accept=".json" onchange="importData(event)">
  </div>
</header>

<main>
  <div class="dash-grid">
    <div class="stat-card"><div class="stat-label">Stock</div><div id="stockVal" class="stat-val">0 kg</div></div>
    <div class="stat-card"><div class="stat-label">Sales</div><div id="salesVal" class="stat-val">$0</div></div>
    <div class="stat-card" style="border-left-color:var(--success)"><div class="stat-label">Profit</div><div id="profitVal" class="stat-val">$0</div></div>
  </div>

  <div style="display:flex; gap:10px; margin-bottom:20px;">
    <button class="btn btn-gold" style="flex:1" onclick="openModal('saleModal')">+ New Order</button>
    <button class="btn btn-gold" style="flex:1" onclick="openModal('expModal')">+ Expense/Stock</button>
    <button class="btn btn-danger" style="flex:1" onclick="initBatchClose()">CLOSE BATCH</button>
  </div>

  <div class="card">
    <span class="section-title">Active Batch Ledger</span>
    <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>Date</th><th>Client/Note</th><th>Kgs</th><th>Total</th></tr></thead>
        <tbody id="ledgerBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card" style="border-top: 2px solid var(--gold);">
    <span class="section-title">Monthly Summary History</span>
    <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>Closed Date</th><th>Gross</th><th>Costs</th><th>Net Profit</th></tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Modals -->
<div id="reportModal" class="modal"><div class="sheet">
    <h2 style="color:var(--gold); margin:0;">BATCH SUMMARY</h2>
    <div id="reportSummary" style="font-family: monospace; line-height: 2; margin: 20px 0;"></div>
    <button class="btn btn-gold" style="width:100%;" onclick="finalizeArchive()">SAVE TO HISTORY & CLEAR</button>
    <button class="btn" style="width:100%; color:#666;" onclick="closeModal('reportModal')">CANCEL</button>
</div></div>

<div id="saleModal" class="modal"><div class="sheet">
    <label>CLIENT NAME</label><input id="sClient" type="text">
    <label>KILOS</label><input id="sKilos" type="number" step="0.1">
    <label>PRICE PER KG</label><input id="sPrice" type="number" value="50">
    <label>DELIVERY</label><input id="sDel" type="number" value="10">
    <button class="btn btn-gold" style="width:100%;" onclick="saveItem('SALE')">SAVE ORDER</button>
</div></div>

<div id="expModal" class="modal"><div class="sheet">
    <label>NOTE / SUPPLIER</label><input id="eNote" type="text">
    <label>COST ($)</label><input id="eCost" type="number">
    <label>KILOS (IF STOCK)</label><input id="eKilos" type="number" value="0">
    <button class="btn btn-gold" style="width:100%;" onclick="saveItem('EXPENSE')">SAVE ENTRY</button>
</div></div>

<script>
let bizData = JSON.parse(localStorage.getItem("perreria_v9.9") || '{"transactions":[], "history":[]}');
let tempSummary = {};

function save() { localStorage.setItem("perreria_v9.9", JSON.stringify(bizData)); render(); }
function openModal(id) { document.getElementById(id).style.display = "flex"; }
function closeModal(id) { document.getElementById(id).style.display = "none"; }

function saveItem(type) {
    const item = { id: Date.now(), date: new Date().toLocaleDateString() };
    if(type === 'SALE') {
        item.type = 'SALE'; item.note = document.getElementById('sClient').value;
        item.kgs = parseFloat(document.getElementById('sKilos').value) || 0;
        item.total = (item.kgs * (parseFloat(document.getElementById('sPrice').value) || 0)) + (parseFloat(document.getElementById('sDel').value) || 0);
    } else {
        item.type = 'EXPENSE'; item.note = document.getElementById('eNote').value;
        item.kgs = parseFloat(document.getElementById('eKilos').value) || 0;
        item.total = -(parseFloat(document.getElementById('eCost').value) || 0);
    }
    bizData.transactions.push(item); save(); closeModal('saleModal'); closeModal('expModal');
}

function render() {
    let stock = 0, sales = 0, costs = 0;
    document.getElementById('ledgerBody').innerHTML = bizData.transactions.map(t => {
        if(t.type === 'SALE') { sales += t.total; stock -= t.kgs; }
        else { costs += Math.abs(t.total); stock += t.kgs; }
        return `<tr><td>${t.date.slice(0,5)}</td><td>${t.note}</td><td>${t.kgs}</td><td style="color:${t.total < 0 ? 'var(--danger)':'#fff'}">$${t.total}</td></tr>`;
    }).join('');

    document.getElementById('historyBody').innerHTML = bizData.history.slice().reverse().map(h => `
        <tr><td>${h.date}</td><td>$${h.gross}</td><td>$${h.costs}</td><td style="color:var(--success); font-weight:bold;">$${h.net}</td></tr>
    `).join('');

    document.getElementById('stockVal').innerText = stock.toFixed(1) + " kg";
    document.getElementById('salesVal').innerText = "$" + sales.toFixed(2);
    document.getElementById('profitVal').innerText = "$" + (sales - costs).toFixed(2);
}

function initBatchClose() {
    if(bizData.transactions.length === 0) return alert("No active data to close.");
    let gross = 0, costs = 0;
    bizData.transactions.forEach(t => { if(t.total > 0) gross += t.total; else costs += Math.abs(t.total); });
    tempSummary = { date: new Date().toLocaleDateString(), gross: gross.toFixed(2), costs: costs.toFixed(2), net: (gross - costs).toFixed(2) };
    document.getElementById('reportSummary').innerHTML = `GROSS SALES: $${tempSummary.gross}<br>TOTAL COSTS: -$${tempSummary.costs}<br>-------------------<br><b style="color:var(--success)">NET PROFIT: $${tempSummary.net}</b>`;
    openModal('reportModal');
}

function finalizeArchive() {
    bizData.history.push(tempSummary); bizData.transactions = []; save(); closeModal('reportModal');
}

// Backup Logic
function exportData() {
    const blob = new Blob([JSON.stringify(bizData)], {type: 'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `Perreria_Backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
}

function importData(event) {
    const reader = new FileReader();
    reader.onload = (e) => {
        if(confirm("This will replace your current ledger and history. Are you sure?")) {
            bizData = JSON.parse(e.target.result);
            save();
            location.reload();
        }
    };
    reader.readAsText(event.target.files[0]);
}

render();
</script>
</body>
</html>
