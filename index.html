<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Perrería Gourmet PV – Version 10.5 (RESTORED)</title>
<style>
  :root { --gold: #d4af37; --bg: #000000; --card-bg: #111111; --text: #ffffff; --danger: #ff4444; --success: #25D366; --pending: #ffcc00; --blue: #3498db; }
  body { margin:0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 150px; }
  header { padding:30px 20px; border-bottom: 2px solid var(--gold); background: #000; text-align: center; }
  .logo-upload-zone { cursor: pointer; max-width: 200px; margin: auto; border: 2px dashed var(--gold); padding: 15px; border-radius: 15px; }
  #mainLogo { max-height: 100px; max-width: 100%; display: block; margin: auto; }
  main { padding:20px; max-width:1100px; margin:auto; }
  .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 25px; }
  .stat-card { background: var(--card-bg); border: 1px solid #333; padding: 12px; border-radius: 8px; border-left: 4px solid var(--gold); }
  .stat-card.delivery { border-left-color: var(--blue); }
  .stat-card.free-gift { border-left-color: #555; }
  .stat-label { font-size: 8px; color: var(--gold); text-transform: uppercase; font-weight: 900; }
  .stat-val { font-size: 16px; font-weight: 700; color: #fff; margin-top: 4px; }
  .action-bar { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
  .btn { padding: 12px 18px; border: none; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
  .btn-gold { background: var(--gold); color: #000; }
  .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
  .btn-danger-action { background: #440000; color: #fff; border: 1px solid var(--danger); }
  .btn-wa-action { background: var(--success); color: #000; width: 100%; margin-top: 15px; border-radius: 30px; font-size: 14px; font-weight: bold; }
  .btn-sm { padding: 6px 8px; font-size: 10px; border-radius: 3px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
  .card { background: var(--card-bg); border: 1px solid #333; border-radius: 8px; padding: 20px; margin-bottom: 25px; }
  .receipt-preview { background: #000; padding: 15px; border-radius: 8px; border: 1px solid #444; margin-top: 15px; color: #fff; font-family: monospace; font-size: 13px; white-space: pre-wrap; }
  table { width: 100%; border-collapse: collapse; min-width: 650px; }
  th { text-align: left; color: #aaa; padding: 12px; border-bottom: 1px solid #444; font-size: 10px; text-transform: uppercase; }
  td { padding: 12px; border-bottom: 1px solid #222; font-size: 13px; }
  .badge { padding: 6px 10px; border-radius: 4px; font-size: 10px; font-weight: 900; text-transform: uppercase; border: none; }
  .badge-pending { background: #332b00; color: var(--pending); border: 1px solid var(--pending); cursor: pointer; }
  .badge-done { background: #002200; color: var(--success); border: 1px solid var(--success); cursor: pointer; }
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .sheet { background: #0a0a0a; padding: 25px; border-radius: 12px; border: 2px solid var(--gold); width: 100%; max-width: 450px; overflow-y: auto; max-height: 90vh; }
  label { font-size: 10px; color: var(--gold); font-weight: 900; display: block; margin-top: 10px; text-transform: uppercase; }
  input, select { width: 100%; padding: 12px; margin: 5px 0; background: #111; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
  footer { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #333; padding: 15px; text-align: center; color: var(--gold); font-size: 11px; font-weight: bold; }
  .btn-grp { display: flex; gap: 5px; }
</style>
</head>
<body>

<header>
  <div class="logo-upload-zone" onclick="document.getElementById('logoInput').click()">
    <img id="mainLogo" src="" style="display:none;">
    <div id="logoLabel" style="color:var(--gold); font-size:10px; font-weight:bold;">UPLOAD BRAND LOGO</div>
  </div>
  <input type="file" id="logoInput" hidden accept="image/*" onchange="uploadLogo(event)">
</header>

<main>
  <!-- TOP BACKUP BAR -->
  <div class="action-bar" style="justify-content: center; border-bottom: 1px solid #222; padding-bottom: 15px;">
    <button class="btn" style="background:#333; color:#fff;" onclick="exportData()">💾 EXPORT BACKUP</button>
    <button class="btn" style="background:#333; color:#fff;" onclick="document.getElementById('importFile').click()">📂 IMPORT BACKUP</button>
    <input type="file" id="importFile" hidden onchange="importData(event)">
  </div>

  <div class="dash-grid">
    <div class="stat-card"><div class="stat-label">Chicken (Main)</div><div id="stockVal" class="stat-val">0.0 kg</div></div>
    <div class="stat-card"><div class="stat-label">Gizzards</div><div id="gizVal" class="stat-val">0g</div></div>
    <div class="stat-card"><div class="stat-label">Feet</div><div id="feetVal" class="stat-val">0g</div></div>
    <div class="stat-card"><div class="stat-label">Revenue</div><div id="todaySales" class="stat-val">$0.00</div></div>
    <div class="stat-card delivery"><div class="stat-label">Delivery</div><div id="deliverySales" class="stat-val">$0.00</div></div>
    <div class="stat-card free-gift"><div class="stat-label">Free/Gifts</div><div id="freeStat" class="stat-val">0 units</div></div>
  </div>

  <div class="action-bar">
    <button class="btn btn-gold" onclick="openModal('saleModal')">New Order</button>
    <button class="btn btn-outline" onclick="openModal('stockModal')">+ Stock</button>
    <button class="btn btn-danger-action" onclick="openModal('expenseModal')">+ Expense / Loss</button>
    <button class="btn" style="background:#440000; color:var(--gold); border:1px solid var(--danger);" onclick="closeBatch()">Close Batch</button>
  </div>

  <div class="card">
    <h3 style="margin:0 0 15px 0; color:var(--gold); font-size:12px; letter-spacing:1px;">TRANSACTION LEDGER</h3>
    <div style="overflow-x:auto;"><table id="ledgerTable"><thead><tr><th>Date</th><th>Entry Detail</th><th>Status</th><th>Total</th><th>Actions</th></tr></thead><tbody id="ledgerBody"></tbody></table></div>
  </div>
</main>

<footer>LA PERRERÍA GOURMET PV – V10.5</footer>

<!-- SALE MODAL -->
<div id="saleModal" class="modal"><div class="sheet">
    <h2 style="color:var(--gold); margin:0;">NEW ORDER</h2>
    <input type="hidden" id="editSId">
    <label>Date</label><input id="sDate" type="date">
    <label>Client Name</label><input id="sClient" oninput="updateReceipt()">
    <label>Product</label><select id="sProd" onchange="syncUnits('sProd','sUnitLabel'); updateReceipt()"><option value="CHICKEN">CHICKEN (MAIN)</option><option value="GIZZARDS">GIZZARDS</option><option value="FEET">FEET</option></select>
    <label>WhatsApp</label><input id="sPhone">
    <label>Address</label><input id="sAddress" oninput="updateReceipt()">
    <div style="display:flex; gap:10px;">
      <div style="flex:1;"><label id="sUnitLabel">Qty (kg)</label><input id="sKilos" type="number" step="0.1" oninput="updateReceipt()"></div>
      <div style="flex:1;"><label>Price</label><input id="sPrice" type="number" oninput="updateReceipt()"></div>
      <div style="flex:1;"><label>Delivery</label><input id="sDelivery" type="number" oninput="updateReceipt()"></div>
    </div>
    <div id="receiptPreview" class="receipt-preview"><div id="receiptContent">...</div><div style="text-align:center; margin-top:10px; font-weight:bold; color:var(--gold); font-size:18px;" id="grandTotalLabel">TOTAL: $0</div></div>
    <button class="btn btn-wa-action" onclick="sendWhatsApp()">📱 SEND WHATSAPP</button>
    <button class="btn btn-gold" style="width:100%; margin-top:15px;" onclick="saveSale()">SAVE ORDER</button>
    <button class="btn" style="width:100%; color:#666;" onclick="closeModal('saleModal')">CANCEL</button>
</div></div>

<!-- STOCK MODAL -->
<div id="stockModal" class="modal"><div class="sheet">
    <h2 style="color:var(--gold); margin:0;">ADD STOCK</h2>
    <input type="hidden" id="editStId">
    <label>Date</label><input id="stDate" type="date">
    <label>Category</label><select id="stProd" onchange="syncUnits('stProd','stUnitLabel')"><option value="CHICKEN">CHICKEN</option><option value="GIZZARDS">GIZZARDS</option><option value="FEET">FEET</option></select>
    <label>Supplier/Note</label><input id="stSupplier">
    <label id="stUnitLabel">Amount (kg)</label><input id="stKilos" type="number" step="0.1">
    <label>Total Cost ($)</label><input id="stCost" type="number" step="0.01">
    <button class="btn btn-gold" style="width:100%; margin-top:20px;" onclick="saveStock()">SAVE STOCK</button>
    <button class="btn" style="width:100%; color:#666;" onclick="closeModal('stockModal')">CANCEL</button>
</div></div>

<!-- EXPENSE MODAL -->
<div id="expenseModal" class="modal"><div class="sheet">
    <h2 style="color:var(--gold); margin:0;">EXPENSE / LOSS</h2>
    <input type="hidden" id="editExId">
    <label>Type</label><select id="exType"><option value="EXPENSE">BUSINESS EXPENSE</option><option value="LOSS">PRODUCT LOSS</option></select>
    <label>Affects Stock</label><select id="exProd" onchange="syncUnits('exProd','exUnitLabel')"><option value="CHICKEN">CHICKEN</option><option value="GIZZARDS">GIZZARDS</option><option value="FEET">FEET</option></select>
    <label>Date</label><input id="exDate" type="date">
    <label>Description</label><input id="exNote">
    <label>Cost ($)</label><input id="exCost" type="number" step="0.01">
    <label id="exUnitLabel">Qty (kg)</label><input id="exKilos" type="number" step="0.1">
    <button class="btn btn-gold" style="width:100%; margin-top:20px;" onclick="saveExpense()">SAVE ENTRY</button>
    <button class="btn" style="width:100%; color:#666;" onclick="closeModal('expenseModal')">CANCEL</button>
</div></div>

<script>
let bizData = JSON.parse(localStorage.getItem("perreria_v9") || '{"transactions":[], "logo": null, "batchHistory": []}');

function save() { localStorage.setItem("perreria_v9", JSON.stringify(bizData)); render(); }

function syncUnits(selectId, labelId) {
    const val = document.getElementById(selectId).value;
    document.getElementById(labelId).innerText = (val === "CHICKEN") ? "Qty (kg)" : "Qty (g)";
}

function openModal(id) { 
    const d = new Date().toLocaleDateString('sv-SE');
    if(id === 'saleModal') { 
        document.getElementById('editSId').value = ""; document.getElementById('sClient').value = ""; 
        document.getElementById('sPhone').value = ""; document.getElementById('sAddress').value = "";
        document.getElementById('sKilos').value = 0; document.getElementById('sPrice').value = 50; 
        document.getElementById('sDelivery').value = 10; syncUnits('sProd','sUnitLabel'); updateReceipt(); 
    }
    if(id === 'stockModal') { document.getElementById('editStId').value = ""; document.getElementById('stSupplier').value = ""; document.getElementById('stKilos').value = 0; syncUnits('stProd','stUnitLabel'); }
    if(id === 'expenseModal') { document.getElementById('editExId').value = ""; document.getElementById('exNote').value = ""; document.getElementById('exCost').value = 0; syncUnits('exProd','exUnitLabel'); }
    document.getElementById(id).style.display = "flex"; 
    ['sDate', 'stDate', 'exDate'].forEach(f => { if(document.getElementById(f)) document.getElementById(f).value = d; });
}

function closeModal(id) { document.getElementById(id).style.display = "none"; }

function editTx(id) {
    const t = bizData.transactions.find(x => x.id === id);
    if(!t) return;
    if(t.type === 'SALE') {
        openModal('saleModal'); document.getElementById('editSId').value = t.id;
        document.getElementById('sDate').value = t.date; document.getElementById('sClient').value = t.client;
        document.getElementById('sProd').value = t.product || "CHICKEN"; document.getElementById('sPhone').value = t.phone || "";
        document.getElementById('sAddress').value = t.address || ""; document.getElementById('sKilos').value = t.kilos;
        document.getElementById('sPrice').value = t.pricePerKg; document.getElementById('sDelivery').value = t.delFee;
        syncUnits('sProd','sUnitLabel'); updateReceipt();
    } else if(t.type === 'STOCK') {
        openModal('stockModal'); document.getElementById('editStId').value = t.id;
        document.getElementById('stDate').value = t.date; document.getElementById('stProd').value = t.product || "CHICKEN";
        document.getElementById('stSupplier').value = t.client; document.getElementById('stKilos').value = t.kilos;
        document.getElementById('stCost').value = Math.abs(t.total); syncUnits('stProd','stUnitLabel');
    } else {
        openModal('expenseModal'); document.getElementById('editExId').value = t.id;
        document.getElementById('exDate').value = t.date; document.getElementById('exType').value = t.type;
        document.getElementById('exProd').value = t.product || "CHICKEN"; document.getElementById('exNote').value = t.client;
        document.getElementById('exCost').value = Math.abs(t.total); document.getElementById('exKilos').value = t.kilos || 0;
        syncUnits('exProd','exUnitLabel');
    }
}

function updateReceipt() {
    const k = parseFloat(document.getElementById('sKilos').value) || 0, p = parseFloat(document.getElementById('sPrice').value) || 0, d = parseFloat(document.getElementById('sDelivery').value) || 0;
    const prod = document.getElementById('sProd').value;
    const unit = prod === "CHICKEN" ? "kg" : "g";
    document.getElementById('grandTotalLabel').innerText = `TOTAL: $${((k * p) + d).toFixed(0)} MXN`;
    document.getElementById('receiptContent').innerText = `CLIENTE: ${document.getElementById('sClient').value}\nPRODUCTO: ${prod}\nPEDIDO: ${k}${unit} x $${p}\nENVÍO: $${d}\n📍: ${document.getElementById('sAddress').value}`;
}

function sendWhatsApp() {
    const k = parseFloat(document.getElementById('sKilos').value) || 0, p = parseFloat(document.getElementById('sPrice').value) || 0, del = parseFloat(document.getElementById('sDelivery').value) || 0;
    const phone = document.getElementById('sPhone').value.replace(/\D/g,''), prod = document.getElementById('sProd').value;
    const msg = encodeURIComponent(`🍗 *LA PERRERÍA GOURMET PV*\n*PEDIDO:* ${prod} (${k}${prod==="CHICKEN"?"kg":"g"})\n*ENVÍO:* $${del}\n*TOTAL: $${(k*p)+del} MXN*`);
    if(phone) window.open(`https://wa.me/${phone.length === 10 ? '52'+phone : phone}?text=${msg}`, '_blank');
}

function saveSale() {
    const id = document.getElementById('editSId').value, k = parseFloat(document.getElementById('sKilos').value) || 0, p = parseFloat(document.getElementById('sPrice').value) || 0, d = parseFloat(document.getElementById('sDelivery').value) || 0;
    const data = { id: id ? parseInt(id) : Date.now(), date: document.getElementById('sDate').value, type: 'SALE', client: document.getElementById('sClient').value, product: document.getElementById('sProd').value, phone: document.getElementById('sPhone').value, address: document.getElementById('sAddress').value, kilos: k, pricePerKg: p, delFee: d, status: 'PENDING', total: (k * p) + d };
    if(id) { const idx = bizData.transactions.findIndex(x => x.id == id); data.status = bizData.transactions[idx].status; bizData.transactions[idx] = data; }
    else bizData.transactions.push(data);
    save(); closeModal('saleModal');
}

function saveStock() {
    const id = document.getElementById('editStId').value;
    const data = { id: id ? parseInt(id) : Date.now(), date: document.getElementById('stDate').value, type: 'STOCK', client: document.getElementById('stSupplier').value, product: document.getElementById('stProd').value, kilos: parseFloat(document.getElementById('stKilos').value) || 0, total: -parseFloat(document.getElementById('stCost').value) || 0 };
    if(id) { const idx = bizData.transactions.findIndex(x => x.id == id); bizData.transactions[idx] = data; }
    else bizData.transactions.push(data);
    save(); closeModal('stockModal');
}

function saveExpense() {
    const id = document.getElementById('editExId').value;
    const data = { id: id ? parseInt(id) : Date.now(), date: document.getElementById('exDate').value, type: document.getElementById('exType').value, product: document.getElementById('exProd').value, client: document.getElementById('exNote').value, kilos: parseFloat(document.getElementById('exKilos').value) || 0, total: -parseFloat(document.getElementById('exCost').value) || 0 };
    if(id) { const idx = bizData.transactions.findIndex(x => x.id == id); bizData.transactions[idx] = data; }
    else bizData.transactions.push(data);
    save(); closeModal('expenseModal');
}

function toggleStatus(id) { const tx = bizData.transactions.find(t => t.id === id); if(tx) { tx.status = (tx.status === 'COMPLETED') ? 'PENDING' : 'COMPLETED'; save(); } }
function deleteTx(id) { if(confirm("Delete?")) { bizData.transactions = bizData.transactions.filter(t => t.id !== id); save(); } }

function render() {
    const today = new Date().toLocaleDateString('sv-SE');
    let s_chicken = 0, s_giz = 0, s_feet = 0, pRev = 0, dRev = 0, fCount = 0;
    const logoImg = document.getElementById('mainLogo');
    if(bizData.logo) { logoImg.src = bizData.logo; logoImg.style.display = "block"; document.getElementById('logoLabel').style.display = "none"; }
    else { logoImg.style.display = "none"; document.getElementById('logoLabel').style.display = "block"; }

    document.getElementById('ledgerBody').innerHTML = bizData.transactions.sort((a,b) => b.id - a.id).map(t => {
        const prod = t.product || "CHICKEN";
        const amt = parseFloat(t.kilos) || 0;
        if(t.type === 'SALE' || t.type === 'LOSS') {
            const factor = -amt;
            if(prod === "CHICKEN") s_chicken += factor; else if(prod === "GIZZARDS") s_giz += factor; else s_feet += factor;
            if(t.type === 'SALE' && t.date === today && t.status === 'COMPLETED') { 
                pRev += (t.total - t.delFee); dRev += t.delFee; 
                if(t.pricePerKg === 0) fCount += amt; 
            }
        } else if (t.type === 'STOCK') { if(prod === "CHICKEN") s_chicken += amt; else if(prod === "GIZZARDS") s_giz += amt; else s_feet += amt; }
        return `<tr><td>${t.date.slice(5)}</td><td>${t.client} <small>(${prod})</small></td><td><button class="badge ${t.status === 'COMPLETED' ? 'badge-done' : 'badge-pending'}" onclick="toggleStatus(${t.id})">${t.type==='SALE'?t.status:t.type}</button></td><td>$${Math.abs(t.total).toFixed(0)}</td><td class="btn-grp"><button class="btn-sm" style="background:#222; color:var(--gold);" onclick="editTx(${t.id})">EDIT</button><button class="btn-sm" style="background:#300; color:#fff;" onclick="deleteTx(${t.id})">DEL</button></td></tr>`;
    }).join("");

    document.getElementById('stockVal').innerText = s_chicken.toFixed(1) + ' kg';
    document.getElementById('gizVal').innerText = s_giz.toFixed(0) + 'g';
    document.getElementById('feetVal').innerText = s_feet.toFixed(0) + 'g';
    document.getElementById('todaySales').innerText = '$' + pRev.toFixed(0);
    document.getElementById('deliverySales').innerText = '$' + dRev.toFixed(0);
    document.getElementById('freeStat').innerText = fCount.toFixed(1) + ' units';
}

function exportData() {
    const blob = new Blob([JSON.stringify(bizData)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `perreria_v10.5.json`; a.click();
}
function importData(event) {
    const reader = new FileReader();
    reader.onload = function(e) { bizData = JSON.parse(e.target.result); save(); location.reload(); };
    reader.readAsText(event.target.files[0]);
}
function uploadLogo(event) {
    const reader = new FileReader();
    reader.onload = function() { bizData.logo = reader.result; save(); };
    reader.readAsDataURL(event.target.files[0]);
}

function closeBatch() {
    if(confirm("CLOSE BATCH?")) {
        let pRev = 0, dRev = 0, exp = 0, totalK = 0;
        bizData.transactions.forEach(t => {
            if(t.type === 'SALE') { pRev += (t.total - t.delFee); dRev += t.delFee; if(t.product === "CHICKEN") totalK += t.kilos; }
            else if (t.type === 'EXPENSE' || t.type === 'LOSS') { exp += Math.abs(t.total); }
        });
        if(!bizData.batchHistory) bizData.batchHistory = [];
        bizData.batchHistory.push({ id: Date.now(), productRevenue: pRev, deliveryRevenue: dRev, expenses: exp, totalKilosSold: totalK, netIncome: (pRev + dRev) - exp });
        bizData.transactions = []; save();
    }
}
render();
</script>
</body>
</html>
