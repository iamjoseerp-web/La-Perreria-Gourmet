<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Perrería Gourmet PV – V11.0</title>
<style>
  :root { --gold: #d4af37; --bg: #000; --card-bg: #111; --text: #fff; --danger: #ff4444; --success: #25D366; --pending: #ffcc00; }
  body { margin:0; font-family: sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
  header { padding:20px; border-bottom: 2px solid var(--gold); text-align: center; }
  main { padding:15px; max-width:1000px; margin:auto; }
  .dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--card-bg); padding: 10px; border-radius: 8px; border-left: 3px solid var(--gold); }
  .stat-label { font-size: 9px; color: var(--gold); text-transform: uppercase; font-weight: bold; }
  .stat-val { font-size: 14px; font-weight: bold; }
  .neg-stock { color: var(--danger); }
  .action-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .btn { padding: 10px 15px; border-radius: 4px; border:none; font-weight: bold; cursor: pointer; font-size: 11px; }
  .btn-gold { background: var(--gold); color: #000; }
  .btn-danger { background: #400; color: #fff; }
  .card { background: var(--card-bg); padding: 15px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { color: #888; text-align: left; padding: 10px; border-bottom: 1px solid #333; }
  td { padding: 10px; border-bottom: 1px solid #222; }
  .modal { position: fixed; inset:0; background: rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:2000; padding:20px; }
  .sheet { background: #000; padding: 20px; border: 2px solid var(--gold); border-radius: 12px; width:100%; max-width: 400px; }
  input, select { width:100%; padding:10px; margin: 8px 0; background:#222; color:#fff; border:1px solid #444; border-radius:4px; }
  .summary-line { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px dashed #444; padding-bottom: 5px; }
</style>
</head>
<body>

<header>
    <h2 style="color:var(--gold); margin:0;">LA PERRERÍA GOURMET PV</h2>
    <small id="batchDateLabel"></small>
</header>

<main>
  <div class="dash-grid">
    <div class="stat-card"><div class="stat-label">Chicken Left</div><div id="stockVal" class="stat-val">0 kg</div></div>
    <div class="stat-card"><div class="stat-label">Gizzards Left</div><div id="gizVal" class="stat-val">0 g</div></div>
    <div class="stat-card"><div class="stat-label">Current Cash</div><div id="cashVal" class="stat-val">$0</div></div>
  </div>

  <div class="action-bar">
    <button class="btn btn-gold" onclick="openModal('saleModal')">+ NEW ORDER</button>
    <button class="btn" style="background:#333; color:#fff;" onclick="openModal('stockModal')">+ ADD STOCK</button>
    <button class="btn btn-danger" onclick="calculateBatchSummary()">CLOSE BATCH</button>
  </div>

  <div class="card">
    <h4 style="margin-top:0; color:var(--gold);">ACTIVE LEDGER</h4>
    <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>Client</th><th>Qty</th><th>Total</th><th>Status</th><th>X</th></tr></thead>
        <tbody id="ledgerBody"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- BATCH SUMMARY MODAL -->
<div id="batchSummaryModal" class="modal"><div class="sheet">
    <h3 style="color:var(--gold);">BATCH REPORT</h3>
    <div id="summaryContent"></div>
    <hr style="border:0; border-top:1px solid var(--gold);">
    <p style="font-size:11px; color:#aaa;">Closing this batch will carry over remaining stock and archive these transactions.</p>
    <button class="btn btn-gold" style="width:100%;" onclick="confirmBatchClose()">FINALIZE & CARRY OVER</button>
    <button class="btn" style="width:100%; margin-top:10px; color:#999;" onclick="closeModal('batchSummaryModal')">GO BACK</button>
</div></div>

<!-- SALE MODAL -->
<div id="saleModal" class="modal"><div class="sheet">
    <input type="hidden" id="editSId">
    <label>Client</label><input id="sClient" placeholder="Name">
    <label>Product</label><select id="sProd"><option value="CHICKEN">CHICKEN</option><option value="GIZZARDS">GIZZARDS</option></select>
    <label>Qty (kg/g)</label><input id="sKilos" type="number" step="0.1">
    <label>Price Per Unit</label><input id="sPrice" type="number">
    <label>Delivery</label><input id="sDelivery" type="number" value="0">
    <button class="btn btn-gold" style="width:100%; margin-top:15px;" onclick="saveSale()">SAVE ENTRY</button>
    <button class="btn" style="width:100%; color:#666;" onclick="closeModal('saleModal')">CANCEL</button>
</div></div>

<!-- STOCK MODAL -->
<div id="stockModal" class="modal"><div class="sheet">
    <label>Stock Type</label><select id="stProd"><option value="CHICKEN">CHICKEN</option><option value="GIZZARDS">GIZZARDS</option></select>
    <label>Amount Added</label><input id="stKilos" type="number" step="0.1">
    <label>Cost of Stock ($)</label><input id="stCost" type="number">
    <button class="btn btn-gold" style="width:100%; margin-top:15px;" onclick="saveStock()">ADD TO STOCK</button>
    <button class="btn" style="width:100%; color:#666;" onclick="closeModal('stockModal')">CANCEL</button>
</div></div>

<script>
let bizData = JSON.parse(localStorage.getItem("perreria_v10") || '{"transactions":[], "batchHistory": []}');

function save() { localStorage.setItem("perreria_v10", JSON.stringify(bizData)); render(); }

function openModal(id) { document.getElementById(id).style.display = "flex"; }
function closeModal(id) { 
    document.querySelectorAll('input:not([type="hidden"])').forEach(i => i.value = "");
    document.getElementById(id).style.display = "none"; 
}

function saveSale() {
    const id = document.getElementById('editSId').value;
    const k = parseFloat(document.getElementById('sKilos').value) || 0;
    const p = parseFloat(document.getElementById('sPrice').value) || 0;
    const d = parseFloat(document.getElementById('sDelivery').value) || 0;
    
    const entry = {
        id: id ? parseInt(id) : Date.now(),
        type: 'SALE',
        client: document.getElementById('sClient').value || 'Guest',
        product: document.getElementById('sProd').value,
        kilos: k,
        total: (k * p) + d,
        status: 'PENDING',
        archived: false
    };

    if(id) {
        const idx = bizData.transactions.findIndex(t => t.id == id);
        entry.status = bizData.transactions[idx].status;
        bizData.transactions[idx] = entry;
    } else { bizData.transactions.push(entry); }
    
    document.getElementById('editSId').value = "";
    save(); closeModal('saleModal');
}

function saveStock() {
    bizData.transactions.push({
        id: Date.now(),
        type: 'STOCK',
        product: document.getElementById('stProd').value,
        kilos: parseFloat(document.getElementById('stKilos').value) || 0,
        cost: parseFloat(document.getElementById('stCost').value) || 0,
        archived: false,
        client: 'STOCK BUY'
    });
    save(); closeModal('stockModal');
}

function toggleStatus(id) {
    const idx = bizData.transactions.findIndex(t => t.id === id);
    bizData.transactions[idx].status = bizData.transactions[idx].status === 'PENDING' ? 'COMPLETED' : 'PENDING';
    save();
}

function deleteTx(id) {
    if(confirm("Delete permanently?")) {
        bizData.transactions = bizData.transactions.filter(t => t.id !== id);
        save();
    }
}

function render() {
    let s_chicken = 0, s_giz = 0, cash = 0;
    const tbody = document.getElementById('ledgerBody');
    tbody.innerHTML = "";
    document.getElementById('batchDateLabel').innerText = "Batch: " + new Date().toLocaleDateString();

    bizData.transactions.forEach(t => {
        if(t.type === 'SALE') {
            if(t.product === "CHICKEN") s_chicken -= t.kilos; else s_giz -= t.kilos;
            if(t.status === 'COMPLETED') cash += t.total;
        } else {
            if(t.product === "CHICKEN") s_chicken += t.kilos; else s_giz += t.kilos;
            if(!t.archived) cash -= (t.cost || 0); 
        }

        if(!t.archived) {
            tbody.innerHTML += `<tr>
                <td>${t.client}</td>
                <td>${t.kilos}</td>
                <td>$${(t.total || 0).toFixed(0)}</td>
                <td><button onclick="toggleStatus(${t.id})" class="btn" style="background:${t.status==='COMPLETED'?'#040':'#440'}; font-size:9px;">${t.status || 'STOCK'}</button></td>
                <td><button onclick="deleteTx(${t.id})" style="background:none; border:none; color:red; cursor:pointer;">✕</button></td>
            </tr>`;
        }
    });

    const cDisp = document.getElementById('stockVal');
    const gDisp = document.getElementById('gizVal');
    
    cDisp.innerText = s_chicken.toFixed(1) + ' kg';
    cDisp.className = s_chicken < 0 ? 'stat-val neg-stock' : 'stat-val';
    
    gDisp.innerText = s_giz.toFixed(0) + ' g';
    gDisp.className = s_giz < 0 ? 'stat-val neg-stock' : 'stat-val';
    
    document.getElementById('cashVal').innerText = '$' + cash.toFixed(0);
}

function calculateBatchSummary() {
    let sales = 0, expenses = 0, cLeft = 0, gLeft = 0, pending = 0;
    
    bizData.transactions.forEach(t => {
        if(!t.archived) {
            if(t.type === 'SALE') {
                if(t.status === 'COMPLETED') sales += t.total;
                else pending++;
                if(t.product === "CHICKEN") cLeft -= t.kilos; else gLeft -= t.kilos;
            } else {
                expenses += (t.cost || 0);
                if(t.product === "CHICKEN") cLeft += t.kilos; else gLeft += t.kilos;
            }
        }
    });

    document.getElementById('summaryContent').innerHTML = `
        <div class="summary-line"><span>Gross (Completed):</span> <span>$${sales}</span></div>
        <div class="summary-line"><span>Expenses:</span> <span>-$${expenses}</span></div>
        <div class="summary-line" style="color:var(--success); font-weight:bold;"><span>Net:</span> <span>$${sales - expenses}</span></div>
        <div class="summary-line" style="color:var(--pending);"><span>Pending Orders:</span> <span>${pending}</span></div>
        <br>
        <div class="summary-line"><span>Carry Over Chicken:</span> <span>${cLeft.toFixed(1)} kg</span></div>
        <div class="summary-line"><span>Carry Over Gizzards:</span> <span>${gLeft.toFixed(0)} g</span></div>
    `;
    openModal('batchSummaryModal');
}

function confirmBatchClose() {
    const hasPending = bizData.transactions.some(t => !t.archived && t.status === 'PENDING');
    if(hasPending && !confirm("You have PENDING orders. They won't be counted in profit. Close anyway?")) return;

    let cLeft = 0, gLeft = 0;
    bizData.transactions.forEach(t => {
        if(t.type === 'SALE') {
            if(t.product === "CHICKEN") cLeft -= t.kilos; else gLeft -= t.kilos;
        } else {
            if(t.product === "CHICKEN") cLeft += t.kilos; else gLeft += t.kilos;
        }
    });

    bizData.transactions.forEach(t => t.archived = true);

    const now = Date.now();
    bizData.transactions.push({
        id: now, type: 'STOCK', product: 'CHICKEN', kilos: cLeft, cost: 0, archived: false, client: 'CARRY OVER'
    });
    bizData.transactions.push({
        id: now + 1, type: 'STOCK', product: 'GIZZARDS', kilos: gLeft, cost: 0, archived: false, client: 'CARRY OVER'
    });

    save();
    closeModal('batchSummaryModal');
    alert("Batch Closed successfully.");
}

render();
</script>
</body>
</html>
