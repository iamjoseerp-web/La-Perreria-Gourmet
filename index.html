<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Perrería Gourmet PV – Master</title>
<style>
  :root { --gold: #d4af37; --bg: #0b0b0b; --card-bg: #141414; --text: #f5f5f5; --danger: #cc0000; --success: #25D366; --wa: #25D366; }
  body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }
  
  header { padding:20px; border-bottom: 3px solid var(--gold); background: #000; text-align: center; }
  .logo-placeholder { font-weight: 900; color: var(--gold); letter-spacing: 2px; font-size: 24px; text-transform: uppercase; }
  .logo-sub { font-size: 12px; color: #888; letter-spacing: 4px; }

  main { padding:20px; max-width:1100px; margin:auto; }

  /* DASHBOARD STATS */
  .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
  .stat-card { background: var(--card-bg); border: 1px solid #333; padding: 20px; border-radius: 12px; border-top: 4px solid var(--gold); }
  .stat-label { font-size: 11px; color: #888; text-transform: uppercase; font-weight: 900; }
  .stat-val { font-size: 24px; font-weight: 700; color: #fff; margin-top: 5px; }

  /* ACTION BUTTONS */
  .action-bar { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
  .btn { padding: 12px 20px; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-gold { background: var(--gold); color: #000; }
  .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
  .btn-danger { background: #440000; color: #ff5a5a; }
  .btn-wa-action { background: var(--success); color: #000; width: 100%; margin-top: 10px; }

  /* TABLES */
  .card { background: var(--card-bg); border: 1px solid #2a2a2a; border-radius: 15px; padding: 20px; margin-bottom: 25px; }
  .table-container { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: #080808; }
  th { text-align: left; color: var(--gold); padding: 12px; border-bottom: 2px solid #222; font-size: 11px; text-transform: uppercase; }
  td { padding: 12px; border-bottom: 1px solid #1a1a1a; font-size: 14px; }

  /* MODALS */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .sheet { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid var(--gold); width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
  label { font-size: 11px; font-weight: 900; color: var(--gold); display: block; margin-top: 15px; text-transform: uppercase; }
  input, textarea { width: 100%; padding: 12px; margin: 5px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
  
  .receipt-preview { background: #000; padding: 15px; border-radius: 8px; border: 1px dashed var(--gold); margin-top: 15px; color: var(--success); font-family: monospace; font-size: 12px; white-space: pre-wrap; }
</style>
</head>
<body>

<header>
  <div class="logo-placeholder">LA PERRERÍA GOURMET</div>
  <div class="logo-sub">NATURAL PET FOOD PV</div>
</header>

<main>
  <div class="dash-grid">
    <div class="stat-card">
      <div class="stat-label">Inventory Balance</div>
      <div id="stockVal" class="stat-val">0.0 kg</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Today's Revenue</div>
      <div id="todaySales" class="stat-val">$0.00</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Today's Volume</div>
      <div id="todayKilos" class="stat-val">0.0 kg</div>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn btn-gold" onclick="openModal('saleModal')">➕ NEW SALE</button>
    <button class="btn btn-outline" onclick="openModal('stockModal')">📦 ADD STOCK</button>
    <button class="btn btn-danger" onclick="openModal('expenseModal')">💸 EXPENSE</button>
  </div>

  <div class="card">
    <h3 style="margin-top:0; color:var(--gold); font-size:14px;">SALES & EXPENSES LEDGER</h3>
    <div class="table-container">
      <table>
        <thead>
          <tr><th>Date</th><th>Client/Item</th><th>Kilos</th><th>Total</th><th>WA</th><th></th></tr>
        </thead>
        <tbody id="ledgerBody"></tbody>
      </table>
    </div>
  </div>

  <div style="text-align:center; padding:20px; opacity:0.5;">
    <button class="btn btn-outline" style="font-size:10px;" onclick="exportData()">💾 BACKUP DATA</button>
    <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    <button class="btn btn-outline" style="font-size:10px; margin-left:10px;" onclick="document.getElementById('importFile').click()">📂 RESTORE DATA</button>
  </div>
</main>

<!-- SALE MODAL -->
<div id="saleModal" class="modal"><div class="sheet">
    <h2 style="color:var(--gold); margin-top:0;">NEW ORDER</h2>
    <label>Sale Date</label><input id="sDate" type="date">
    <label>Client Name</label><input id="sClient" placeholder="First Last" oninput="updateReceipt()">
    <label>WhatsApp Number</label><input id="sPhone" type="tel" placeholder="521..." oninput="updateReceipt()">
    <label>Address</label><textarea id="sAddress" rows="2" placeholder="Street, Neighborhood" oninput="updateReceipt()"></textarea>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      <div><label>Kilos</label><input id="sKilos" type="number" step="0.1" value="1" oninput="applyDeliveryLogic()"></div>
      <div><label>Price/kg</label><input id="sPrice" type="number" value="50" oninput="updateReceipt()"></div>
    </div>
    
    <label>Delivery Fee (Pesos)</label>
    <input id="sDelivery" type="number" value="10" oninput="updateReceipt()">

    <div id="receiptPreview" class="receipt-preview"></div>
    
    <button class="btn btn-wa-action" onclick="sendWhatsApp()">📱 SEND WHATSAPP RECEIPT</button>
    <button class="btn btn-gold" style="width:100%; margin-top:10px;" onclick="addSale()">SAVE TO LEDGER</button>
    <button class="btn" style="width:100%; color:#555;" onclick="closeModal('saleModal')">CLOSE</button>
</div></div>

<!-- STOCK MODAL -->
<div id="stockModal" class="modal"><div class="sheet">
    <h2 style="color:var(--gold); margin-top:0;">RESTOCK INVENTORY</h2>
    <label>Purchase Date</label><input id="stDate" type="date">
    <label>Kilos Added</label><input id="stKilos" type="number" step="0.1">
    <label>Total Cost ($)</label><input id="stCost" type="number">
    <label>Supplier/Note</label><input id="stNote" placeholder="e.g. Butcher">
    <button class="btn btn-gold" style="width:100%; margin-top:20px;" onclick="addStock()">UPDATE STOCK</button>
    <button class="btn" style="width:100%; color:#555;" onclick="closeModal('stockModal')">CANCEL</button>
</div></div>

<!-- EXPENSE MODAL -->
<div id="expenseModal" class="modal"><div class="sheet">
    <h2 style="color:#ff5a5a; margin-top:0;">RECORD EXPENSE</h2>
    <label>Expense Date</label><input id="exDate" type="date">
    <label>Description</label><input id="exNote" placeholder="e.g. Gas, Bags">
    <label>Amount ($)</label><input id="exCost" type="number">
    <button class="btn btn-danger" style="width:100%; margin-top:20px;" onclick="addExpense()">SUBTRACT EXPENSE</button>
    <button class="btn" style="width:100%; color:#555;" onclick="closeModal('expenseModal')">CANCEL</button>
</div></div>

<script>
let bizData = JSON.parse(localStorage.getItem("perreria_v6") || '{"stock":0, "transactions":[]}');

function save() { localStorage.setItem("perreria_v6", JSON.stringify(bizData)); render(); }

function openModal(id) { 
    const today = new Date().toISOString().slice(0,10);
    if(id === 'saleModal') { document.getElementById('sDate').value = today; applyDeliveryLogic(); }
    if(id === 'stockModal') { document.getElementById('stDate').value = today; }
    if(id === 'expenseModal') { document.getElementById('exDate').value = today; }
    document.getElementById(id).style.display = "flex"; 
}

function closeModal(id) { document.getElementById(id).style.display = "none"; }

function applyDeliveryLogic() {
    const k = parseFloat(document.getElementById('sKilos').value) || 0;
    // Free delivery if 5kg or more, else 10 pesos
    document.getElementById('sDelivery').value = (k >= 5) ? 0 : 10;
    updateReceipt();
}

function updateReceipt() {
    const name = document.getElementById('sClient').value || "Customer";
    const k = document.getElementById('sKilos').value || 0;
    const p = document.getElementById('sPrice').value || 0;
    const del = parseFloat(document.getElementById('sDelivery').value) || 0;
    const addr = document.getElementById('sAddress').value || "Not set";
    const total = (k * p) + del;

    const msg = `🍗 *La Perrería Gourmet PV*\nConfirmed Order!\n\n` +
                `Client: ${name}\n` +
                `Order: ${k}kg @ $${p}\n` +
                `Delivery: ${del > 0 ? '$' + del : 'FREE'}\n` +
                `*Total: $${total} Pesos*\n\n` +
                `📍 Address: ${addr}\n\n` +
                `Thank you for choosing Natural!`;
    
    document.getElementById('receiptPreview').innerText = msg;
}

function sendWhatsApp() {
    const phone = document.getElementById('sPhone').value.replace(/\D/g,'');
    const msg = encodeURIComponent(document.getElementById('receiptPreview').innerText);
    if(!phone) return alert("Enter a phone number.");
    window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
}

function addSale() {
    const k = parseFloat(document.getElementById('sKilos').value);
    const p = parseFloat(document.getElementById('sPrice').value);
    const del = parseFloat(document.getElementById('sDelivery').value);
    bizData.transactions.push({ id: Date.now(), date: document.getElementById('sDate').value, type: 'sale', client: document.getElementById('sClient').value, kilos: k, total: (k * p) + del, phone: document.getElementById('sPhone').value.replace(/\D/g,'') });
    bizData.stock -= k;
    save(); closeModal('saleModal');
}

function addStock() {
    const k = parseFloat(document.getElementById('stKilos').value);
    bizData.transactions.push({ id: Date.now(), date: document.getElementById('stDate').value, type: 'purchase', client: document.getElementById('stNote').value, kilos: k, total: -parseFloat(document.getElementById('stCost').value) });
    bizData.stock += k;
    save(); closeModal('stockModal');
}

function addExpense() {
    bizData.transactions.push({ id: Date.now(), date: document.getElementById('exDate').value, type: 'expense', client: document.getElementById('exNote').value, kilos: 0, total: -parseFloat(document.getElementById('exCost').value) });
    save(); closeModal('expenseModal');
}

function deleteTx(id) { if(confirm("Remove?")) { bizData.transactions = bizData.transactions.filter(t => t.id !== id); save(); } }

function render() {
    const today = new Date().toISOString().slice(0,10);
    let dK = 0; let dS = 0;
    document.getElementById('stockVal').innerText = bizData.stock.toFixed(1) + ' kg';
    const sorted = bizData.transactions.sort((a,b) => b.date.localeCompare(a.date) || b.id - a.id);
    const body = document.getElementById('ledgerBody');
    body.innerHTML = sorted.map(t => {
        if(t.date === today && t.type === 'sale') { dK += t.kilos; dS += t.total; }
        const color = t.type === 'sale' ? 'var(--success)' : '#ff5a5a';
        const waLink = t.phone ? `<a href="https://wa.me/${t.phone}" target="_blank" style="text-decoration:none; color:var(--success);">WA</a>` : '';
        return `<tr>
            <td>${t.date.split('-').slice(1).join('/')}</td>
            <td><div style="font-weight:bold;">${t.client}</div><div style="font-size:9px; opacity:0.5;">${t.type.toUpperCase()}</div></td>
            <td>${t.kilos ? t.kilos+'kg' : '-'}</td>
            <td style="color:${color}; font-weight:bold;">$${Math.abs(t.total).toFixed(2)}</td>
            <td>${waLink}</td>
            <td><button style="background:none; border:none; color:#333;" onclick="deleteTx(${t.id})">✕</button></td>
        </tr>`;
    }).join("");
    document.getElementById('todaySales').innerText = '$' + dS.toFixed(2);
    document.getElementById('todayKilos').innerText = dK.toFixed(1) + ' kg';
}

function exportData() {
    const blob = new Blob([JSON.stringify(bizData)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `Perreria_Data.json`; a.click();
}

function importData(event) {
    const reader = new FileReader();
    reader.onload = (e) => { bizData = JSON.parse(e.target.result); save(); };
    reader.readAsText(event.target.files[0]);
}

render();
</script>
</body>
</html>
