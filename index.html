<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Perrería Gourmet PV – v10.1</title>
<style>
  :root { --gold: #d4af37; --bg: #000000; --card-bg: #111111; --text: #ffffff; --danger: #ff4444; --success: #25D366; }
  body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
  header { padding:20px; border-bottom: 2px solid var(--gold); text-align: center; }
  main { padding:15px; max-width:1000px; margin:auto; }
  
  .backup-bar { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
  .btn { padding: 12px; border: none; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; }
  .btn-gold { background: var(--gold); color: #000; }
  .btn-dark { background: #222; color: #fff; border: 1px solid #444; flex: 1; }
  .btn-danger { background: #330000; color: var(--danger); border: 1px solid var(--danger); }

  .dash-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--card-bg); border: 1px solid #333; padding: 12px; border-radius: 8px; border-left: 4px solid var(--gold); }
  .stat-label { font-size: 9px; color: var(--gold); text-transform: uppercase; font-weight: bold; }
  .stat-val { font-size: 18px; font-weight: bold; }

  .card { background: var(--card-bg); border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 25px; }
  .section-title { color: var(--gold); font-size: 12px; font-weight: 900; text-transform: uppercase; margin-bottom: 12px; }
  
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; color: #777; font-size: 10px; padding: 8px; border-bottom: 1px solid #333; }
  td { padding: 12px 8px; border-bottom: 1px solid #222; font-size: 14px; }

  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
  .sheet { background: #0a0a0a; padding: 25px; border-radius: 12px; border: 2px solid var(--gold); width: 90%; max-width: 400px; }
  input { width: 100%; padding: 14px; margin: 8px 0 18px; background: #161616; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
  
  footer { text-align: center; padding: 20px; font-size: 10px; color: #555; border-top: 1px solid #222; margin-top: 40px; }
</style>
</head>
<body>

<header>
  <div style="font-size: 24px; font-weight: 900; color: var(--gold);">LA PERRERÍA GOURMET</div>
  <div class="backup-bar" style="max-width: 400px; margin: 15px auto;">
    <button class="btn btn-dark" onclick="exportData()">💾 EXPORT</button>
    <button class="btn btn-dark" onclick="document.getElementById('importFile').click()">📂 IMPORT</button>
    <input type="file" id="importFile" hidden accept=".json" onchange="importData(event)">
  </div>
</header>

<main>
  <div class="dash-grid">
    <div class="stat-card"><div class="stat-label">Stock</div><div id="stockVal" class="stat-val">0 kg</div></div>
    <div class="stat-card"><div class="stat-label">Sales</div><div id="salesVal" class="stat-val">$0</div></div>
    <div class="stat-card" style="border-left-color:var(--success)"><div class="stat-label">Net Profit</div><div id="profitVal" class="stat-val">$0</div></div>
  </div>

  <div style="display:flex; gap:12px; margin-bottom:25px;">
    <button class="btn btn-gold" style="flex:1" onclick="openModal('saleModal')">+ ORDER</button>
    <button class="btn btn-gold" style="flex:1" onclick="openModal('expModal')">+ EXPENSE</button>
    <button class="btn btn-danger" style="flex:1.2" onclick="initBatchClose()">CLOSE BATCH</button>
  </div>

  <div class="card">
    <div class="section-title">Active Batch Ledger</div>
    <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>Date</th><th>Detail</th><th>Kgs</th><th>Total</th></tr></thead>
        <tbody id="ledgerBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card" style="border-top: 3px solid var(--gold);">
    <div class="section-title">Archived Batch History</div>
    <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>Closed On</th><th>Sales</th><th>Costs</th><th>Net Profit</th></tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>
</main>

<footer>
    LA PERRERÍA GOURMET PV • VERSION 10.1 • PUERTO VALLARTA
</footer>

<!-- Modals -->
<div id="reportModal" class="modal"><div class="sheet">
    <h2 style="color:var(--gold); margin:0;">BATCH REPORT</h2>
    <div id="reportSummary" style="font-family: monospace; line-height: 2; margin: 20px 0;"></div>
    <button class="btn btn-gold" style="width:100%;" onclick="finalizeArchive()">SAVE & CLEAR</button>
    <button class="btn" style="width:100%; color:#666;" onclick="closeModal('reportModal')">BACK</button>
</div></div>

<div id="saleModal" class="modal"><div class="sheet">
    <input id="sClient" type="text" placeholder="Client Name">
    <input id="sKilos" type="number" step="0.1" placeholder="Kilos">
    <input id="sPrice" type="number" value="50">
    <input id="sDel" type="number" value="10">
    <button class="btn btn-gold" style="width:100%;" onclick="saveItem('SALE')">SAVE ORDER</button>
</div></div>

<div id="expModal" class="modal"><div class="sheet">
    <input id="eNote" type="text" placeholder="Expense Note">
    <input id="eCost" type="number" placeholder="Cost $">
    <input id="eKilos" type="number" value="0">
    <button class="btn btn-gold" style="width:100%;" onclick="saveItem('EXPENSE')">SAVE EXPENSE</button>
</div></div>

<script>
let bizData = JSON.parse(localStorage.getItem("perreria_v10.1") || '{"transactions":[], "history":[]}');
let tempSummary = {};

function save() { localStorage.setItem("perreria_v10.1", JSON.stringify(bizData)); render(); }
function openModal(id) { document.getElementById(id).style.display = "flex"; }
function closeModal(id) { document.getElementById(id).style.display = "none"; }

function saveItem(type) {
    const item = { id: Date.now(), date: new Date().toLocaleDateString() };
    if(type === 'SALE') {
        item.type = 'SALE'; item.note = document.getElementById('sClient').value || 'Order';
        item.kgs = parseFloat(document.getElementById('sKilos').value) || 0;
        item.total = (item.kgs * (parseFloat(document.getElementById('sPrice').value) || 0)) + (parseFloat(document.getElementById('sDel').value) || 0);
    } else {
        item.type = 'EXPENSE'; item.note = document.getElementById('eNote').value || 'Expense';
        item.kgs = parseFloat(document.getElementById('eKilos').value) || 0;
        item.total = -(parseFloat(document.getElementById('eCost').value) || 0);
    }
    bizData.transactions.push(item); save(); closeModal('saleModal'); closeModal('expModal');
}

function render() {
    let stock = 0, sales = 0, costs = 0;
    document.getElementById('ledgerBody').innerHTML = bizData.transactions.map(t => {
        if(t.type === 'SALE') { sales += t.total; stock -= t.kgs; }
        else { costs += Math.abs(t.total); stock += t.kgs; }
        return `<tr><td>${t.date.slice(0,5)}</td><td>${t.note}</td><td>${t.kgs}</td><td style="color:${t.total < 0 ? 'var(--danger)':'#fff'}">$${Math.abs(t.total).toFixed(2)}</td></tr>`;
    }).join('');

    document.getElementById('historyBody').innerHTML = bizData.history.slice().reverse().map(h => `
        <tr><td>${h.date}</td><td>$${h.gross}</td><td>$${h.costs}</td><td style="color:var(--success); font-weight:bold;">$${h.net}</td></tr>
    `).join('');

    document.getElementById('stockVal').innerText = stock.toFixed(1) + " kg";
    document.getElementById('salesVal').innerText = "$" + sales.toFixed(2);
    document.getElementById('profitVal').innerText = "$" + (sales - costs).toFixed(2);
}

function initBatchClose() {
    if(bizData.transactions.length === 0) return;
    let gross = 0, costs = 0;
    bizData.transactions.forEach(t => { if(t.total > 0) gross += t.total; else costs += Math.abs(t.total); });
    tempSummary = { date: new Date().toLocaleDateString(), gross: gross.toFixed(2), costs: costs.toFixed(2), net: (gross - costs).toFixed(2) };
    document.getElementById('reportSummary').innerHTML = `SALES: $${tempSummary.gross}<br>COSTS: $${tempSummary.costs}<br>-------------------<br>NET: $${tempSummary.net}`;
    openModal('reportModal');
}

function finalizeArchive() {
    bizData.history.push(tempSummary); bizData.transactions = []; save(); closeModal('reportModal');
}

function exportData() {
    const blob = new Blob([JSON.stringify(bizData)], {type: 'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `Perreria_v10.1_${new Date().toISOString().slice(0,10)}.json`; a.click();
}

function importData(event) {
    const reader = new FileReader();
    reader.onload = (e) => {
        if(confirm("Replace all data with this backup?")) {
            bizData = JSON.parse(e.target.result);
            save(); location.reload();
        }
    };
    reader.readAsText(event.target.files[0]);
}

render();
</script>
</body>
</html>
