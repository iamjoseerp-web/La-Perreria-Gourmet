<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Perrería Gourmet PV – Pro</title>
<style>
  :root { --gold: #d4af37; --bg: #0b0b0b; --card-bg: #141414; --text: #f5f5f5; --success: #25D366; --danger: #cc0000; }
  body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }
  
  header { padding:20px; border-bottom: 3px solid var(--gold); background: #000; text-align: center; }
  .logo-placeholder { font-weight: 900; color: var(--gold); letter-spacing: 2px; font-size: 24px; text-transform: uppercase; }
  
  main { padding:20px; max-width:1100px; margin:auto; }

  .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
  .stat-card { background: var(--card-bg); border: 1px solid #333; padding: 15px; border-radius: 12px; border-top: 4px solid var(--gold); }
  .stat-label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: 900; }
  .stat-val { font-size: 22px; font-weight: 700; color: #fff; margin-top: 5px; }

  .btn { padding: 12px 15px; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 12px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-gold { background: var(--gold); color: #000; }
  .btn-wa { background: var(--success); color: #000; width: 100%; margin-top: 10px; }

  .card { background: var(--card-bg); border: 1px solid #2a2a2a; border-radius: 15px; padding: 15px; margin-bottom: 25px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; color: var(--gold); padding: 10px; font-size: 10px; text-transform: uppercase; border-bottom: 1px solid #333; }
  td { padding: 12px 10px; border-bottom: 1px solid #1a1a1a; font-size: 13px; }

  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .sheet { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 2px solid var(--gold); width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
  label { font-size: 10px; font-weight: 900; color: var(--gold); display: block; margin-top: 12px; text-transform: uppercase; }
  input, textarea { width: 100%; padding: 12px; margin: 5px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
  
  .receipt-preview { background: #000; padding: 15px; border-radius: 8px; border: 1px dashed #444; margin-top: 15px; color: #25D366; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
</style>
</head>
<body>

<header>
  <div class="logo-placeholder">LA PERRERÍA GOURMET</div>
</header>

<main>
  <div class="dash-grid">
    <div class="stat-card">
      <div class="stat-label">Stock Inventory</div>
      <div id="stockVal" class="stat-val">0.0 kg</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Daily Revenue</div>
      <div id="todaySales" class="stat-val">$0.00</div>
    </div>
  </div>

  <div style="display:flex; gap:10px; margin-bottom:20px;">
    <button class="btn btn-gold" onclick="openModal('saleModal')">➕ NEW SALE</button>
    <button class="btn btn-gold" style="background:#222; color:var(--gold);" onclick="openModal('stockModal')">📦 STOCK</button>
    <button class="btn btn-gold" style="background:#400; color:#ff5a5a;" onclick="openModal('expenseModal')">💸 EXPENSE</button>
  </div>

  <div class="card">
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr><th>Date</th><th>Client</th><th>Order</th><th>Total</th><th></th></tr>
        </thead>
        <tbody id="ledgerBody"></tbody>
      </table>
    </div>
  </div>

  <div style="text-align:center; opacity:0.3;">
    <button class="btn" style="font-size:9px;" onclick="exportData()">💾 EXPORT</button>
    <button class="btn" style="font-size:9px;" onclick="document.getElementById('importFile').click()">📂 IMPORT</button>
    <input type="file" id="importFile" style="display:none" onchange="importData(event)">
  </div>
</main>

<!-- SALE MODAL -->
<div id="saleModal" class="modal"><div class="sheet">
    <h2 style="color:var(--gold); margin:0;">NEW ORDER</h2>
    <label>Date</label><input id="sDate" type="date">
    <label>Client Name</label><input id="sClient" placeholder="First Last" oninput="updateReceipt()">
    <label>WhatsApp (e.g. 521322...)</label><input id="sPhone" type="tel" oninput="updateReceipt()">
    <label>Delivery Address</label><textarea id="sAddress" rows="2" oninput="updateReceipt()"></textarea>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      <div><label>Kilos</label><input id="sKilos" type="number" step="0.5" value="1" oninput="applyDeliveryLogic()"></div>
      <div><label>Price/kg</label><input id="sPrice" type="number" value="50" oninput="updateReceipt()"></div>
    </div>

    <label>Delivery Fee (Pesos)</label>
    <input id="sDelivery" type="number" value="10" oninput="updateReceipt()">

    <div id="receiptPreview" class="receipt-preview"></div>
    
    <button class="btn btn-wa" onclick="sendWhatsApp()">📱 SEND WHATSAPP RECEIPT</button>
    <button class="btn btn-gold" style="width:100%; margin-top:10px;" onclick="addSale()">SAVE TO LEDGER</button>
    <button class="btn" style="width:100%; color:#555;" onclick="closeModal('saleModal')">CANCEL</button>
</div></div>

<!-- OTHER MODALS (Inventory/Expense) -->
<div id="stockModal" class="modal"><div class="sheet">
  <label>Date</label><input id="stDate" type="date">
  <label>Kilos Added</label><input id="stKilos" type="number">
  <label>Cost</label><input id="stCost" type="number">
  <button class="btn btn-gold" style="width:100%; margin-top:20px;" onclick="addStock()">ADD STOCK</button>
</div></div>

<div id="expenseModal" class="modal"><div class="sheet">
  <label>Date</label><input id="exDate" type="date">
  <label>Reason</label><input id="exNote">
  <label>Amount</label><input id="exCost" type="number">
  <button class="btn btn-gold" style="width:100%; margin-top:20px;" onclick="addExpense()">SAVE EXPENSE</button>
</div></div>

<script>
let bizData = JSON.parse(localStorage.getItem("perreria_v5") || '{"stock":0, "transactions":[]}');

function save() { localStorage.setItem("perreria_v5", JSON.stringify(bizData)); render(); }

function openModal(id) { 
    const today = new Date().toISOString().slice(0,10);
    if(id === 'saleModal') { 
        document.getElementById('sDate').value = today; 
        applyDeliveryLogic(); 
    }
    document.getElementById(id).style.display = "flex"; 
}

function closeModal(id) { document.getElementById(id).style.display = "none"; }

function applyDeliveryLogic() {
    const k = parseFloat(document.getElementById('sKilos').value) || 0;
    // If 5kg or more, delivery is FREE (0), else 10 pesos
    document.getElementById('sDelivery').value = (k >= 5) ? 0 : 10;
    updateReceipt();
}

function updateReceipt() {
    const name = document.getElementById('sClient').value || "Customer";
    const k = document.getElementById('sKilos').value || 0;
    const p = document.getElementById('sPrice').value || 0;
    const del = parseFloat(document.getElementById('sDelivery').value) || 0;
    const addr = document.getElementById('sAddress').value || "Not provided";
    const total = (k * p) + del;

    const msg = `🍗 *La Perrería Gourmet PV*\nOrder Confirmed!\n\n` +
                `Client: ${name}\n` +
                `Order: ${k}kg @ $${p}\n` +
                `Delivery: ${del > 0 ? '$' + del : 'FREE'}\n` +
                `*Total: $${total} Pesos*\n\n` +
                `📍 Address: ${addr}\n\n` +
                `Thank you for your purchase!`;
    
    document.getElementById('receiptPreview').innerText = msg;
}

function sendWhatsApp() {
    const phone = document.getElementById('sPhone').value.replace(/\D/g,'');
    const msg = encodeURIComponent(document.getElementById('receiptPreview').innerText);
    if(!phone) return alert("Enter WhatsApp number!");
    window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
}

function addSale() {
    const k = parseFloat(document.getElementById('sKilos').value);
    const p = parseFloat(document.getElementById('sPrice').value);
    const del = parseFloat(document.getElementById('sDelivery').value);
    bizData.transactions.push({ 
        id: Date.now(), 
        date: document.getElementById('sDate').value, 
        client: document.getElementById('sClient').value,
        details: `${k}kg + Del`,
        total: (k * p) + del,
        kilos: k,
        type: 'sale'
    });
    bizData.stock -= k;
    save(); closeModal('saleModal');
}

function addStock() {
    const k = parseFloat(document.getElementById('stKilos').value);
    bizData.transactions.push({ id: Date.now(), date: document.getElementById('stDate').value, client: 'Restock', details: k+'kg', total: -parseFloat(document.getElementById('stCost').value), type: 'stock' });
    bizData.stock += k;
    save(); closeModal('stockModal');
}

function addExpense() {
    bizData.transactions.push({ id: Date.now(), date: document.getElementById('exDate').value, client: document.getElementById('exNote').value, details: 'Expense', total: -parseFloat(document.getElementById('exCost').value), type: 'expense' });
    save(); closeModal('expenseModal');
}

function render() {
    const today = new Date().toISOString().slice(0,10);
    let dS = 0;
    document.getElementById('stockVal').innerText = bizData.stock.toFixed(1) + ' kg';
    const sorted = bizData.transactions.sort((a,b) => b.date.localeCompare(a.date));
    
    document.getElementById('ledgerBody').innerHTML = sorted.map(t => {
        if(t.date === today && t.type === 'sale') dS += t.total;
        const color = t.total > 0 ? 'var(--success)' : '#ff5a5a';
        return `<tr><td>${t.date.slice(5)}</td><td>${t.client}</td><td>${t.details}</td><td style="color:${color};font-weight:bold">$${Math.abs(t.total)}</td></tr>`;
    }).join("");
    document.getElementById('todaySales').innerText = '$' + dS.toFixed(2);
}

function exportData() {
    const blob = new Blob([JSON.stringify(bizData)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Perreria_Data.json`;
    a.click();
}

function importData(event) {
    const reader = new FileReader();
    reader.onload = (e) => { bizData = JSON.parse(e.target.result); save(); };
    reader.readAsText(event.target.files[0]);
}

render();
</script>
</body>
</html>
