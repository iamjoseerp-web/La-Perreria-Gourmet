<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Perrería Gourmet PV – Version 9.8 (LOCKED HISTORY)</title>
<style>
  :root { --gold: #d4af37; --bg: #000000; --card-bg: #111111; --text: #ffffff; --danger: #ff4444; --success: #25D366; --pending: #ffcc00; --blue: #3498db; }
  body { margin:0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
  header { padding:20px; border-bottom: 2px solid var(--gold); text-align: center; }
  main { padding:20px; max-width:1100px; margin:auto; }
  
  .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--card-bg); border: 1px solid #333; padding: 12px; border-radius: 8px; border-left: 4px solid var(--gold); }
  .stat-label { font-size: 9px; color: var(--gold); text-transform: uppercase; font-weight: 900; }
  .stat-val { font-size: 18px; font-weight: 700; color: #fff; }

  .btn { padding: 12px 15px; border: none; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; }
  .btn-gold { background: var(--gold); color: #000; }
  .btn-danger { background: #440000; color: #fff; border: 1px solid var(--danger); }
  
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th { text-align: left; color: #666; font-size: 10px; padding: 10px; border-bottom: 1px solid #333; }
  td { padding: 10px; border-bottom: 1px solid #222; font-size: 13px; }

  .card { background: var(--card-bg); border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
  .sheet { background: #0a0a0a; padding: 25px; border-radius: 12px; border: 2px solid var(--gold); width: 90%; max-width: 400px; }
  
  .report-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-family: monospace; border-bottom: 1px dashed #333; }
</style>
</head>
<body>

<header>
    <h1 style="color:var(--gold); margin:0; font-size:18px;">LA PERRERÍA GOURMET PV</h1>
</header>

<main>
  <div class="dash-grid">
    <div class="stat-card"><div class="stat-label">Stock</div><div id="stockVal" class="stat-val">0 kg</div></div>
    <div class="stat-card"><div class="stat-label">Sales</div><div id="salesVal" class="stat-val">$0</div></div>
    <div class="stat-card" style="border-left-color:var(--success)"><div class="stat-label">Net Profit</div><div id="profitVal" class="stat-val">$0</div></div>
  </div>

  <div style="display:flex; gap:10px; margin-bottom:20px;">
    <button class="btn btn-gold" onclick="openModal('saleModal')">+ New Order</button>
    <button class="btn btn-gold" onclick="openModal('stockModal')">+ Stock/Exp</button>
    <button class="btn btn-danger" onclick="initiateCloseBatch()">Close & Archive Batch</button>
  </div>

  <div class="card">
    <div class="stat-label" style="margin-bottom:10px;">Active Ledger</div>
    <div style="overflow-x:auto;">
        <table>
            <thead><tr><th>Date</th><th>Detail</th><th>Kgs</th><th>Total</th></tr></thead>
            <tbody id="ledgerBody"></tbody>
        </table>
    </div>
  </div>

  <div class="card" style="border-top: 2px solid #555;">
    <div class="stat-label" style="margin-bottom:10px; color:#aaa;">Archived Batch History</div>
    <div style="overflow-x:auto;">
        <table>
            <thead><tr><th>Closed Date</th><th>Sales</th><th>Costs</th><th>Net Profit</th></tr></thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
  </div>
</main>

<!-- REPORT MODAL -->
<div id="reportModal" class="modal"><div class="sheet">
    <h2 style="color:var(--gold); margin-top:0;">BATCH REPORT</h2>
    <div id="reportBox"></div>
    <button class="btn btn-gold" style="width:100%; margin-top:20px;" onclick="finalizeArchive()">CONFIRM & CLEAR LEDGER</button>
    <button class="btn" style="width:100%; color:#666;" onclick="closeModal('reportModal')">CANCEL</button>
</div></div>

<!-- FORM MODALS (Sale/Stock) - Simplified for functionality -->
<div id="saleModal" class="modal"><div class="sheet">
    <label>Client</label><input id="sClient" type="text" style="width:100%; margin-bottom:10px;">
    <label>Kilos</label><input id="sKilos" type="number" style="width:100%; margin-bottom:10px;">
    <label>Price</label><input id="sPrice" type="number" style="width:100%; margin-bottom:10px;">
    <label>Delivery</label><input id="sDel" type="number" value="10" style="width:100%; margin-bottom:10px;">
    <button class="btn btn-gold" style="width:100%;" onclick="addTx('SALE')">SAVE ORDER</button>
</div></div>

<script>
let bizData = JSON.parse(localStorage.getItem("perreria_v9.8") || '{"transactions":[], "history":[]}');
let currentReport = {};

function save() { localStorage.setItem("perreria_v9.8", JSON.stringify(bizData)); render(); }
function openModal(id) { document.getElementById(id).style.display = "flex"; }
function closeModal(id) { document.getElementById(id).style.display = "none"; }

function addTx(type) {
    const tx = {
        id: Date.now(),
        date: new Date().toLocaleDateString(),
        type: type,
        client: document.getElementById('sClient').value,
        kilos: parseFloat(document.getElementById('sKilos').value) || 0,
        price: parseFloat(document.getElementById('sPrice').value) || 0,
        del: parseFloat(document.getElementById('sDel').value) || 0
    };
    tx.total = (tx.kilos * tx.price) + tx.del;
    bizData.transactions.push(tx);
    save();
    closeModal('saleModal');
}

function render() {
    let stock = 0, sales = 0, costs = 0;
    
    // Ledger
    document.getElementById('ledgerBody').innerHTML = bizData.transactions.map(t => {
        sales += t.total;
        return `<tr><td>${t.date}</td><td>${t.client}</td><td>${t.kilos}</td><td>$${t.total}</td></tr>`;
    }).join('');

    // History
    document.getElementById('historyBody').innerHTML = bizData.history.slice().reverse().map(h => `
        <tr><td>${h.closedAt}</td><td>$${h.sales}</td><td>$${h.costs}</td><td style="color:var(--success)">$${h.net}</td></tr>
    `).join('');

    document.getElementById('stockVal').innerText = stock + " kg";
    document.getElementById('salesVal').innerText = "$" + sales;
    document.getElementById('profitVal').innerText = "$" + (sales - costs);
}

function initiateCloseBatch() {
    if(bizData.transactions.length === 0) return alert("Ledger is empty.");
    
    let totalSales = 0;
    bizData.transactions.forEach(t => totalSales += t.total);
    
    currentReport = {
        closedAt: new Date().toLocaleDateString(),
        sales: totalSales,
        costs: 0, // Placeholder for expenses
        net: totalSales
    };

    document.getElementById('reportBox').innerHTML = `
        <div class="report-line"><span>Total Sales:</span><span>$${currentReport.sales}</span></div>
        <div class="report-line"><span>Total Costs:</span><span>$${currentReport.costs}</span></div>
        <div class="report-line" style="border:none; font-weight:bold; color:var(--success)"><span>NET PROFIT:</span><span>$${currentReport.net}</span></div>
    `;
    openModal('reportModal');
}

function finalizeArchive() {
    bizData.history.push({
        closedAt: currentReport.closedAt,
        sales: currentReport.sales,
        costs: currentReport.costs,
        net: currentReport.net,
        raw: [...bizData.transactions]
    });
    bizData.transactions = [];
    save();
    closeModal('reportModal');
}

render();
</script>
</body>
</html>
