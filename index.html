<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Perrería Gourmet PV – V8.5 FULL</title>
<style>
  :root { --gold: #d4af37; --bg: #000000; --card-bg: #111111; --text: #ffffff; --danger: #ff4444; --success: #25D366; --pending: #ffcc00; --blue: #3498db; }
  body { margin:0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
  
  header { padding:30px 20px; border-bottom: 2px solid var(--gold); background: #000; text-align: center; }
  .logo-upload-zone { cursor: pointer; max-width: 200px; margin: auto; border: 2px dashed var(--gold); padding: 15px; border-radius: 15px; }
  #mainLogo { max-height: 100px; max-width: 100%; display: block; margin: auto; }

  main { padding:20px; max-width:1100px; margin:auto; }
  .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 25px; }
  .stat-card { background: var(--card-bg); border: 1px solid #333; padding: 15px; border-radius: 8px; border-left: 5px solid var(--gold); }
  .stat-card.delivery { border-left-color: var(--blue); }
  .stat-card.free { border-left-color: #666; }
  .stat-label { font-size: 10px; color: var(--gold); text-transform: uppercase; font-weight: 900; }
  .stat-val { font-size: 24px; font-weight: 700; color: #fff; margin-top: 5px; }

  .action-bar { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
  .btn { padding: 12px 18px; border: none; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
  .btn-gold { background: var(--gold); color: #000; }
  .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
  .btn-danger-action { background: #440000; color: #fff; border: 1px solid var(--danger); }
  .btn-batch { background: #222; color: var(--gold); border: 1px solid var(--gold); }

  .card { background: var(--card-bg); border: 1px solid #333; border-radius: 8px; padding: 20px; margin-bottom: 25px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; color: #aaa; padding: 12px; border-bottom: 1px solid #444; font-size: 10px; text-transform: uppercase; }
  td { padding: 12px; border-bottom: 1px solid #222; font-size: 14px; }

  .badge { padding: 6px 10px; border-radius: 4px; font-size: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; border: none; min-width: 85px; }
  .badge-pending { background: #332b00; color: var(--pending); border: 1px solid var(--pending); }
  .badge-done { background: #002200; color: var(--success); border: 1px solid var(--success); }

  .btn-sm { padding: 8px 12px; font-size: 10px; border-radius: 4px; cursor: pointer; font-weight: 900; border: none; text-transform: uppercase; margin-right: 5px; }
  .btn-edit-sm { background: #333; color: var(--gold); border: 1px solid var(--gold); }
  .btn-del-sm { background: var(--danger); color: #fff; display: inline-flex; align-items: center; justify-content: center; }

  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .sheet { background: #0a0a0a; padding: 25px; border-radius: 12px; border: 2px solid var(--gold); width: 100%; max-width: 450px; overflow-y: auto; max-height: 90vh; }
  label { font-size: 10px; color: var(--gold); font-weight: 900; display: block; margin-top: 10px; text-transform: uppercase; }
  input, textarea { width: 100%; padding: 12px; margin: 5px 0; background: #111; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
</style>
</head>
<body>

<header>
  <div class="logo-upload-zone" onclick="document.getElementById('logoInput').click()">
    <img id="mainLogo" src="" style="display:none;">
    <div id="logoLabel" style="color:var(--gold); font-size:10px; font-weight:bold;">UPLOAD BRAND LOGO</div>
  </div>
  <input type="file" id="logoInput" hidden accept="image/*" onchange="uploadLogo(event)">
</header>

<main>
  <div class="dash-grid">
    <div class="stat-card"><div class="stat-label">Stock Remaining</div><div id="stockVal" class="stat-val">0.0 kg</div></div>
    <div class="stat-card"><div class="stat-label">Product Revenue</div><div id="todaySales" class="stat-val">$0.00</div></div>
    <div class="stat-card delivery"><div class="stat-label">Delivery Revenue</div><div id="deliverySales" class="stat-val">$0.00</div></div>
    <div class="stat-card"><div class="stat-label">Paid Kilos</div><div id="todayKilos" class="stat-val">0.0 kg</div></div>
    <div class="stat-card free"><div class="stat-label">Free Kilos</div><div id="freeKilos" class="stat-val">0.0 kg</div></div>
  </div>

  <div class="action-bar">
    <button class="btn btn-gold" onclick="openModal('saleModal')">New Order</button>
    <button class="btn btn-outline" onclick="openModal('stockModal')">+ Add Stock</button>
    <button class="btn btn-danger-action" onclick="openModal('expenseModal')">+ Add Expense</button>
    <button class="btn btn-batch" onclick="closeBatch()">Close Current Batch</button>
  </div>

  <div class="card">
    <h3 style="margin:0 0 15px 0; color:var(--gold); font-size:12px; letter-spacing:1px;">TRANSACTION LEDGER</h3>
    <div style="overflow-x:auto;">
      <table>
        <thead><tr><th>Date</th><th>Client/Entry</th><th>Status</th><th>Total</th><th>Manage</th></tr></thead>
        <tbody id="ledgerBody"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- SALE MODAL -->
<div id="saleModal" class="modal"><div class="sheet">
    <h2 style="color:var(--gold); margin:0;">NEW ORDER</h2>
    <input type="hidden" id="editId">
    <label>Date</label><input id="sDate" type="date">
    <label>Client</label><input id="sClient" placeholder="Name">
    <label>WhatsApp</label><input id="sPhone" placeholder="Number">
    <label>Address</label><textarea id="sAddress" rows="1" placeholder="Location"></textarea>
    <div style="display:flex; gap:10px;">
      <div style="flex:1;"><label>Kilos</label><input id="sKilos" type="number" step="0.1" value="1"></div>
      <div style="flex:1;"><label>$/Kg</label><input id="sPrice" type="number" value="50"></div>
      <div style="flex:1;"><label>Envío</label><input id="sDelivery" type="number" value="10"></div>
    </div>
    <button class="btn btn-gold" style="width:100%; margin-top:20px;" onclick="saveSale()">SAVE ORDER</button>
    <button class="btn" style="width:100%; color:#666;" onclick="closeModal('saleModal')">CANCEL</button>
</div></div>

<!-- STOCK MODAL -->
<div id="stockModal" class="modal"><div class="sheet">
    <h2 style="color:var(--gold); margin:0;">ADD STOCK</h2>
    <input id="stDate" type="date">
    <label>Supplier</label><input id="stSupplier" placeholder="Source">
    <label>Kilos</label><input id="stKilos" type="number" step="0.1" placeholder="Amount">
    <label>Total Cost ($)</label><input id="stCost" type="number" placeholder="Price Paid">
    <button class="btn btn-gold" style="width:100%; margin-top:20px;" onclick="saveStock()">SAVE STOCK</button>
    <button class="btn" style="width:100%; color:#666;" onclick="closeModal('stockModal')">CANCEL</button>
</div></div>

<!-- EXPENSE MODAL -->
<div id="expenseModal" class="modal"><div class="sheet">
    <h2 style="color:var(--danger); margin:0;">RECORD EXPENSE</h2>
    <input id="exDate" type="date">
    <label>Reason</label><input id="exNote" placeholder="Fuel, Bags, etc.">
    <label>Amount ($)</label><input id="exCost" type="number" placeholder="Total">
    <button class="btn btn-danger-action" style="width:100%; margin-top:20px;" onclick="saveExpense()">SAVE EXPENSE</button>
    <button class="btn" style="width:100%; color:#666;" onclick="closeModal('expenseModal')">CANCEL</button>
</div></div>

<script>
let bizData = JSON.parse(localStorage.getItem("perreria_v8_5") || '{"transactions":[], "logo": null, "history": []}');

function save() { localStorage.setItem("perreria_v8_5", JSON.stringify(bizData)); render(); }

function uploadLogo(event) {
    const reader = new FileReader();
    reader.onload = function() { bizData.logo = reader.result; save(); };
    reader.readAsDataURL(event.target.files[0]);
}

function openModal(id) { 
    document.getElementById(id).style.display = "flex"; 
    const dateFields = ['sDate', 'stDate', 'exDate'];
    dateFields.forEach(f => { if(document.getElementById(f)) document.getElementById(f).value = new Date().toLocaleDateString('sv-SE'); });
}

function closeModal(id) { document.getElementById(id).style.display = "none"; document.getElementById('editId').value = ""; }

function saveSale() {
    const id = document.getElementById('editId').value;
    const k = parseFloat(document.getElementById('sKilos').value) || 0;
    const p = parseFloat(document.getElementById('sPrice').value) || 0;
    const d = parseFloat(document.getElementById('sDelivery').value) || 0;
    const entry = {
        id: id ? parseInt(id) : Date.now(),
        date: document.getElementById('sDate').value,
        type: 'SALE',
        client: document.getElementById('sClient').value,
        kilos: k,
        pricePerKg: p,
        delFee: d,
        total: (k * p) + d,
        status: 'PENDING'
    };
    if(id) bizData.transactions = bizData.transactions.filter(t => t.id != id);
    bizData.transactions.push(entry);
    save(); closeModal('saleModal');
}

function saveStock() {
    const entry = { id: Date.now(), date: document.getElementById('stDate').value, type: 'STOCK', client: document.getElementById('stSupplier').value, kilos: parseFloat(document.getElementById('stKilos').value), total: -parseFloat(document.getElementById('stCost').value) };
    bizData.transactions.push(entry);
    save(); closeModal('stockModal');
}

function saveExpense() {
    const entry = { id: Date.now(), date: document.getElementById('exDate').value, type: 'EXPENSE', client: document.getElementById('exNote').value, kilos: 0, total: -parseFloat(document.getElementById('exCost').value) };
    bizData.transactions.push(entry);
    save(); closeModal('expenseModal');
}

function toggleStatus(id) {
    const tx = bizData.transactions.find(t => t.id === id);
    if(tx) { tx.status = (tx.status === 'COMPLETED') ? 'PENDING' : 'COMPLETED'; save(); }
}

function deleteTx(id) { if(confirm("Permanently delete this record?")) { bizData.transactions = bizData.transactions.filter(t => t.id !== id); save(); } }

function closeBatch() {
    if(!confirm("This will archive current records and reset totals for your next bulk buy. Proceed?")) return;
    const summary = { date: new Date().toLocaleDateString(), data: [...bizData.transactions] };
    bizData.history.push(summary);
    bizData.transactions = [];
    save();
    alert("Batch saved to history and log cleared.");
}

function render() {
    const today = new Date().toLocaleDateString('sv-SE');
    let stock = 0, prodRev = 0, delRev = 0, paidK = 0, freeK = 0;

    if(bizData.logo) { 
        document.getElementById('mainLogo').src = bizData.logo; 
        document.getElementById('mainLogo').style.display = "block"; 
        document.getElementById('logoLabel').style.display = "none"; 
    }
    
    const sorted = bizData.transactions.sort((a,b) => b.date.localeCompare(a.date) || b.id - a.id);
    
    document.getElementById('ledgerBody').innerHTML = sorted.map(t => {
        if(t.type === 'SALE') {
            stock -= t.kilos;
            if(t.date === today && t.status === 'COMPLETED') {
                prodRev += (t.kilos * t.pricePerKg);
                delRev += t.delFee;
                if(t.pricePerKg > 0) paidK += t.kilos; else freeK += t.kilos;
            }
            return `<tr>
                <td style="font-size:11px; color:#888;">${t.date.slice(5)}</td>
                <td><strong>${t.client}</strong><br><span style="font-size:10px; color:#666;">${t.kilos}kg @ $${t.pricePerKg}</span></td>
                <td><button class="badge ${t.status === 'COMPLETED' ? 'badge-done' : 'badge-pending'}" onclick="toggleStatus(${t.id})">${t.status}</button></td>
                <td style="color:var(--success)">$${t.total}</td>
                <td>
                    <button class="btn-sm btn-del-sm" onclick="deleteTx(${t.id})">DELETE</button>
                </td>
            </tr>`;
        } else {
            if(t.type === 'STOCK') stock += t.kilos;
            return `<tr>
                <td style="font-size:11px; color:#888;">${t.date.slice(5)}</td>
                <td><span style="font-size:10px; color:var(--gold)">${t.type}</span><br>${t.client}</td>
                <td>-</td>
                <td style="color:var(--danger)">$${Math.abs(t.total)}</td>
                <td><button class="btn-sm btn-del-sm" onclick="deleteTx(${t.id})">DELETE</button></td>
            </tr>`;
        }
    }).join("");

    document.getElementById('stockVal').innerText = stock.toFixed(1) + ' kg';
    document.getElementById('todaySales').innerText = '$' + prodRev.toFixed(2);
    document.getElementById('deliverySales').innerText = '$' + delRev.toFixed(2);
    document.getElementById('todayKilos').innerText = paidK.toFixed(1) + ' kg';
    document.getElementById('freeKilos').innerText = freeK.toFixed(1) + ' kg';
}

render();
</script>
</body>
</html>
